# Local Postgres for the designs nav. Optional — without DATABASE_URL the
# app runs files-only (export/import JSON, URL-hash share).
#
# Usage:
#   docker compose up -d
#   DATABASE_URL=postgres://paneler:paneler@localhost:5432/paneler \
#     AUTH_DISABLED=true npm run dev
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paneler
      POSTGRES_PASSWORD: paneler
      POSTGRES_DB: paneler
    ports:
      - "5432:5432"
    volumes:
      - paneler-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paneler -d paneler"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  paneler-pgdata:
